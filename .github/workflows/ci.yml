name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Run tests
        run: |
          set -euo pipefail
          # Build with -Werror so platform const/type mismatches (e.g. glibc's
          # const-qualified struct tm fields) fail CI instead of only warning.
          printf '(add-cflag "-Werror")\n(load "test/time.carp")\n' > _ci_werror.carp
          carp -x _ci_werror.carp
          rm -f _ci_werror.carp

      - name: Install angler
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/carpentry-org/angler /tmp/angler
          (cd /tmp/angler && carp -b main.carp)
          sudo install -m 755 /tmp/angler/out/angler /usr/local/bin/

      - name: Install carp-fmt
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/carpentry-org/carp-fmt /tmp/carp-fmt
          (cd /tmp/carp-fmt && carp -b main.carp)
          sudo install -m 755 /tmp/carp-fmt/out/carp-fmt /usr/local/bin/

      - name: Lint
        run: |
          angler $(find . -name '*.carp' \
            -not -path './out/*' \
            -not -path './docs/*' \
            -not -path './.carp-src/*' \
            -not -path './examples/*')

      - name: Format check
        run: |
          carp-fmt --check $(find . -name '*.carp' \
            -not -path './out/*' \
            -not -path './docs/*' \
            -not -path './.carp-src/*' \
            -not -path './examples/*')

      - name: Generate docs
        run: carp -x gendocs.carp
